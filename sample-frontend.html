<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Image Generator</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f0f0f0; }
    input, button { padding: 0.5rem; margin: 0.5rem 0; width: 100%; }
    img { display: block; margin-top: 1rem; max-width: 100%; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>AI Image Generator</h1>
  
  <input id="prompt" type="text" placeholder="Enter your prompt..." />
  <button id="generate">Generate Image</button>
  
  <img id="result" alt="Generated Image will appear here" />

  <script>
    const API_URL = "https://your-worker-domain.com/"; // 🔗 Replace with your worker URL
    const API_KEY = "YOUR_API_KEY_HERE"; // 🔐 Your API key

    document.getElementById("generate").addEventListener("click", async () => {
      const prompt = document.getElementById("prompt").value.trim();
      if (!prompt) {
        alert("Please enter a prompt!");
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${API_KEY}`,
          },
          body: JSON.stringify({ prompt }),
        });

        if (!response.ok) {
          const err = await response.json();
          alert("Error: " + (err.error || "Unknown error"));
          return;
        }

        // Convert the response to a blob (image)
        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);

        // Display the image
        document.getElementById("result").src = imageUrl;

      } catch (err) {
        alert("Failed to fetch image: " + err.message);
      }
    });
  </script>
</body>
</html>
